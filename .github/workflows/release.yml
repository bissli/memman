name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  verify-version:
    name: Verify version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get-version.outputs.version }}
      should_publish: ${{ steps.check-pypi.outputs.should_publish }}
    steps:
      - uses: actions/checkout@v4

      - name: Get version from tag
        id: get-version
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          echo "version=$TAG" >> $GITHUB_OUTPUT
          echo "Tag version: $TAG"

      - name: Verify tag matches pyproject.toml
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          TAG_VERSION=${TAG#v}
          VERSION=$(grep -Po '(?<=^version = ")[^"]*' pyproject.toml)
          if [ "$TAG_VERSION" != "$VERSION" ]; then
            echo "ERROR: Tag ($TAG) does not match pyproject.toml version ($VERSION)"
            exit 1
          fi
          echo "Version verified: $TAG_VERSION"

      - name: Check if version exists on PyPI
        id: check-pypi
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          VERSION=${TAG#v}
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://pypi.org/pypi/memman/$VERSION/json)
          if [ "$HTTP_STATUS" = "200" ]; then
            echo "Version $VERSION already exists on PyPI, skipping publish"
            echo "should_publish=false" >> $GITHUB_OUTPUT
          else
            echo "Version $VERSION not found on PyPI, will publish"
            echo "should_publish=true" >> $GITHUB_OUTPUT
          fi

  build:
    name: Build distributions
    needs: verify-version
    if: needs.verify-version.outputs.should_publish == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Poetry
        run: pip install poetry

      - name: Build sdist + wheel
        run: poetry build

      - name: Upload distributions
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/*

  release:
    name: Release
    needs: [verify-version, build]
    if: needs.verify-version.outputs.should_publish == 'true'
    runs-on: ubuntu-latest
    environment: release
    permissions:
      id-token: write
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: List distributions
        run: ls -la dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: dist/*
          generate_release_notes: true

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
