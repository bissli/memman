name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install poetry && poetry install

      - name: Run unit tests
        run: make test

  test-live:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install poetry && poetry install

      - name: Run unit tests against live providers
        env:
          MEMMAN_OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          MEMMAN_VOYAGE_API_KEY: ${{ secrets.VOYAGE_API_KEY }}
        run: poetry run pytest tests/ --live --ignore=tests/e2e -n 16

  e2e-cli:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install poetry && poetry install --extras postgres

      - name: Run CLI e2e tests
        env:
          MEMMAN_OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          MEMMAN_VOYAGE_API_KEY: ${{ secrets.VOYAGE_API_KEY }}
          MEMMAN_E2E_REQUIRE_LIVE: '1'
        run: make e2e-cli

  e2e-container:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install poetry && poetry install --extras postgres

      - name: Run containerized e2e tests
        env:
          MEMMAN_OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          MEMMAN_VOYAGE_API_KEY: ${{ secrets.VOYAGE_API_KEY }}
          MEMMAN_E2E_REQUIRE_LIVE: '1'
        run: make e2e-container

  release:
    needs: [test, test-live, e2e-cli, e2e-container]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Poetry
        run: pip install poetry

      - name: Build package
        run: poetry build

      - name: Publish to PyPI
        run: poetry publish --no-interaction
        env:
          POETRY_PYPI_TOKEN_PYPI: ${{ secrets.PYPI_TOKEN }}
