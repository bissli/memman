name: CI

on:
  push:
    branches: [master]
    paths-ignore:
      - "docs/**"
      - "*.md"
  pull_request:
    branches: [master]
    paths-ignore:
      - "docs/**"
      - "*.md"

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.11']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install poetry && poetry install

      - name: Run unit tests
        run: make test

  test-live:
    runs-on: ubuntu-latest
    needs: test
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install poetry && poetry install

      - name: Run prompt-quality tests against live providers
        env:
          MEMMAN_OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          MEMMAN_VOYAGE_API_KEY: ${{ secrets.VOYAGE_API_KEY }}
        run: poetry run pytest tests/test_prompt_live.py --live -n 4

  e2e-cli:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install poetry && poetry install --extras postgres

      - name: Run CLI e2e tests
        env:
          MEMMAN_OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          MEMMAN_VOYAGE_API_KEY: ${{ secrets.VOYAGE_API_KEY }}
          MEMMAN_E2E_REQUIRE_LIVE: '1'
        run: make e2e-cli

  e2e-container:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install poetry && poetry install --extras postgres

      - name: Run containerized e2e tests
        env:
          MEMMAN_OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          MEMMAN_VOYAGE_API_KEY: ${{ secrets.VOYAGE_API_KEY }}
          MEMMAN_E2E_REQUIRE_LIVE: '1'
        run: make e2e-container
