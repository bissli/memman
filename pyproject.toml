[tool.poetry]
name = "memman"
version = "0.9.0"
description = "Persistent memory for LLM agents"
authors = ["memman-dev"]
license = "MIT"
readme = "README.md"
packages = [{include = "memman", from = "src"}]
include = ["src/memman/setup/assets/**/*"]

[tool.poetry.scripts]
memman = "memman.cli:cli"

[tool.poetry.dependencies]
python = "^3.11"
cachetools = "^5.3"
click = "^8.1"
httpx = "^0.27"
numpy = ">=1.26"
tqdm = "^4.66"

[tool.poetry.group.dev.dependencies]
pytest = "^8.0"
matplotlib = "^3.8"
networkx = "^3.2"

[build-system]
requires = ["poetry-core"]
build-backend = "poetry.core.masonry.api"

[tool.pytest.ini_options]
testpaths = ["tests"]
markers = [
    "no_mock_llm: skip the autouse OpenRouterClient.complete mock; keep ZDR + embedding stubs",
]
